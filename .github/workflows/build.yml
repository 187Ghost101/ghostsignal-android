name: Build GhostSignal APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.2
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.2/bin" >> $GITHUB_PATH

      - name: Write Gradle files
        run: |
          python3 -c "
          open('build.gradle','w').write('''buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath \"com.android.tools.build:gradle:8.2.0\" }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }''')
          open('gradle.properties','w').write('android.useAndroidX=true\nandroid.enableJetifier=true\n')
          open('app/build.gradle','w').write('''apply plugin: \"com.android.application\"
          android {
              namespace \"com.ghostsignal.imsidetector\"
              compileSdk 34
              defaultConfig {
                  applicationId \"com.ghostsignal.imsidetector\"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName \"1.0\"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile(\"proguard-android-optimize.txt\"), \"proguard-rules.pro\"
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {}''')
          "

      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostSignal-APK
          path: app/build/outputs/apk/debug/app-debug.apk
