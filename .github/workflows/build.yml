name: Build GhostSignal APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.2
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Generate Gradle wrapper JAR
        run: |
          mkdir -p gradle/wrapper/
          mkdir /tmp/gen && cd /tmp/gen
          echo '' > settings.gradle
          gradle wrapper --gradle-version 8.2
          cp gradle/wrapper/gradle-wrapper.jar $GITHUB_WORKSPACE/gradle/wrapper/

      - name: Force write Gradle config files
        run: |
          cat > gradle.properties << 'ENDOFFILE'
          android.useAndroidX=true
          android.enableJetifier=true
          ENDOFFILE
          cat > build.gradle << 'ENDOFFILE'
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.2.0' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          ENDOFFILE
          cat > app/build.gradle << 'ENDOFFILE'
          apply plugin: 'com.android.application'
          android {
              namespace 'com.ghostsignal.imsidetector'
              compileSdk 34
              defaultConfig {
                  applicationId "com.ghostsignal.imsidetector"
                  minSdk 26
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {}
          ENDOFFILE

      - name: Build Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostSignal-APK
          path: app/build/outputs/apk/debug/app-debug.apk
