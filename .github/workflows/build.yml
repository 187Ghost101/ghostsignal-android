name: Build GhostSignal APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
      - name: Generate Gradle Wrapper JAR # <--- NOUVELLE ÉTAPE AJOUTÉE ICI
        run: |
          mkdir -p gradle/wrapper # S'assure que le dossier existe
          gradle wrapper --gradle-version 8.2 --distribution-type bin # Génère le .jar
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GhostSignal-APK
          path: app/build/outputs/apk/debug/app-debug.apk
